name: Build Base Image

on:
  schedule:
    - cron: "0 8 * * *" # daily check
  push:
    branches: [main]
    paths: [docker/base.Dockerfile]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-base

permissions:
  contents: read
  packages: write

jobs:
  check:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    outputs:
      changed: ${{ steps.compare.outputs.changed }}
    steps:
      - name: Check for new Claude Code version
        id: compare
        run: |
          # Get latest available version via the installer
          LATEST=$(curl -fsSL https://claude.ai/install.sh | bash -s -- --version 2>/dev/null || true)
          # If installer doesn't support --version, install and check
          if [ -z "$LATEST" ]; then
            curl -fsSL https://claude.ai/install.sh | bash
            LATEST=$(claude --version 2>/dev/null || echo "unknown")
          fi
          # Get version baked into current base image
          CURRENT=$(docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest claude --version 2>/dev/null || echo "none")
          if [ "$LATEST" != "$CURRENT" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New version available: $LATEST (current: $CURRENT)"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date: $CURRENT"
          fi

  build-base:
    runs-on: ubuntu-latest
    needs: [check]
    if: |
      always() &&
      (needs.check.result == 'skipped' || needs.check.outputs.changed == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/base.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base
          platforms: linux/amd64,linux/arm64

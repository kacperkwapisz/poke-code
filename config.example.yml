default_engine: claude  # "claude" or "opencode"
webhook_url: "https://poke.com/api/v1/inbound/api-message"  # also enables Claude Code hooks for per-tool progress
webhook_bearer_token: ""  # Bearer token for webhook auth
webhook_progress_interval: 10
workspace_dir: "/workspaces"
max_concurrent_clones: 3
opencode:
  model: ""  # e.g. "anthropic/claude-sonnet-4-5", empty = opencode default
  max_concurrent_tasks: 3
claude:
  max_concurrent_tasks: 3
  default_max_turns: 50
  default_max_budget_usd: 1.0
  allowed_tools:
    - Read
    - Edit
    - Write
    - Glob
    - Grep
  disallowed_tools: []
